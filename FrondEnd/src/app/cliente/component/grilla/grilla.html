<section class="grilla">
  <header class="grilla__header">
    <h2>Clients</h2>
    <p class="grilla__subtitle">A simple five-column grid with sticky header and hover states.</p>
    <div class="grilla__actions">
      <button class="btn btn--primary" type="button" (click)="onNuevo()">
        Nuevo
      </button>
    </div>
  </header>

  <div class="grilla__table-wrap">
    <table class="grilla__table" aria-label="Clients table">
      <thead>
        <tr>
          <th scope="col">ID</th>
          <th scope="col">Name</th>
          <th scope="col">RUC</th>
          <th scope="col">Email</th>
          <th scope="col">Acciones</th>
        </tr>
      </thead>
      <tbody>
        <!-- Sample rows (replace with *ngFor later) -->
        <tr>
          <td>003</td>
          <td>Ana Torres</td>
          <td>20567891234</td>
          <td>ana.torres@example.com</td>
          <td class="cell-actions">
            <div class="actions">
              <button type="button" class="btn btn--soft" (click)="onEdit('003')">Edit</button>
              <button type="button" class="btn btn--danger" (click)="onDelete('003')">Delete</button>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</section>
