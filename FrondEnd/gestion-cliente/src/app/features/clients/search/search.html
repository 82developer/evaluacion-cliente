<mat-card class="search-card">
  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="grid">
    <mat-form-field appearance="outline">
      <mat-label>RUC</mat-label>
      <input matInput formControlName="ruc" maxlength="11" placeholder="Ingrese el RUC" (keydown.enter)="onSubmit()" />
      <mat-hint align="end">{{ form.value.ruc?.length || 0 }}/11</mat-hint>
      <mat-error *ngIf="form.controls['ruc']?.hasError('pattern')">Solo dígitos (0–9).</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Razón Social</mat-label>
      <input matInput formControlName="razonSocial" placeholder="Ingrese la Razón Social" (keydown.enter)="onSubmit()" />
    </mat-form-field>

    <div class="actions">
      <button mat-raised-button color="primary" type="submit">Buscar</button>
      <button mat-button type="button" (click)="onClear()">Limpiar</button>
    </div>
  </form>
</mat-card>
